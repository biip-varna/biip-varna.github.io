<main id="main-content">
  <label for="search-input" style="font-weight:bold;display:block;margin-bottom:0.4em;">
    Търсете в публикациите на БИМП:
  </label>
  <input type="search" id="search-input" placeholder="напр. България, Молдова, НАТО…" autofocus autocomplete="off">

  <div class="search-filters" id="lang-filters">
    <button type="button" class="filter-btn active" data-lang="all">Всички</button>
    <button type="button" class="filter-btn" data-lang="bg">🇧🇬 Български</button>
    <button type="button" class="filter-btn" data-lang="en">🇬🇧 English</button>
  </div>

  <div id="tag-filters" style="display:none;"></div>

  <div id="author-filter-wrap" style="display:none;">
    <select id="author-filter" aria-label="Филтриране по автор">
      <option value="">Всички автори</option>
    </select>
  </div>

  <div id="search-count"></div>

<script>
(function(){
  var TAG_LABEL = {
    'bulgaria':'България','moldova':'Молдова','russia':'Русия',
    'eu':'ЕС','balkans':'Балкани','china':'Китай',
    'security':'Сигурност','nato':'НАТО','democracy':'Демокрация',
    'governance':'Управление','corruption':'Корупция',
    'africa':'Африка','southafrica':'Южна Африка',
    'diplomacy':'Дипломация','disinformation':'Дезинформация',
    'ai':'ИИ','digitaleconomy':'Дигитална икономика',
    'economy':'Икономика','europeanparliament':'Европарламент',
    'minorities':'Малцинства','romania':'Румъния',
    'usa':'САЩ','transatlantic':'Трансатлантически','germany':'Германия',
    'trump':'Тръмп','america':'Америка','latinamerica':'Латинска Америка',
  };
  function escHtml(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  var index = [];
  var tagMap = {}; // url -> tags[]
  var currentLang = 'all';
  var currentTag = '';
  var currentAuthor = '';
  var currentQuery = '';

  // Load both search index and articles.json (for tags)
  Promise.all([
    fetch('search-index.json').then(function(r){ return r.json(); }),
    fetch('articles.json').then(function(r){ return r.json(); })
  ]).then(function(results){
    index = results[0];
    var articles = results[1];

    // Build tag lookup map keyed by filename
    articles.forEach(function(a){
      var fname = a.file.split('/').pop();
      tagMap[fname] = a.tags || [];
    });

    // Enrich index items with tags
    index.forEach(function(item){
      var fname = item.url.split('/').pop();
      item.tags = tagMap[fname] || [];
    });

    // Build tag pills from all available tags
    var allTags = {};
    index.forEach(function(item){
      (item.tags || []).forEach(function(t){ allTags[t] = (allTags[t] || 0) + 1; });
    });
    var sortedTags = Object.keys(allTags).sort();
    if (sortedTags.length) {
      var tagHtml = '<button type="button" class="tag-btn active" data-tag="">Всички теми</button>';
      sortedTags.forEach(function(t){
        tagHtml += '<button type="button" class="tag-btn" data-tag="' + escHtml(t) + '">' + escHtml(TAG_LABEL[t] || t) + '</button>';
      });
      var tagWrap = document.getElementById('tag-filters');
      tagWrap.innerHTML = tagHtml;
      tagWrap.style.display = 'flex';

      tagWrap.addEventListener('click', function(e){
        var btn = e.target.closest('.tag-btn');
        if (!btn) return;
        tagWrap.querySelectorAll('.tag-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        currentTag = btn.getAttribute('data-tag');
        doSearch(currentQuery);
      });
    }

    // Build author dropdown
    var authors = {};
    index.forEach(function(item){ if (item.author) authors[item.author] = true; });
    var sortedAuthors = Object.keys(authors).sort();
    if (sortedAuthors.length) {
      var sel = document.getElementById('author-filter');
      sortedAuthors.forEach(function(a){
        var opt = document.createElement('option');
        opt.value = a; opt.textContent = a;
        sel.appendChild(opt);
      });
      document.getElementById('author-filter-wrap').style.display = 'block';
      sel.addEventListener('change', function(){
        currentAuthor = this.value;
        doSearch(currentQuery);
      });
    }

    // Pre-load query from URL ?q=
    var params = new URLSearchParams(window.location.search);
    var q = params.get('q') || '';
    if (q) {
      document.getElementById('search-input').value = q;
      currentQuery = q;
      doSearch(q);
    }
  }).catch(function(){ /* index unavailable */ });

  document.getElementById('search-input').addEventListener('input', function(){
    currentQuery = this.value.trim();
    doSearch(currentQuery);
  });

  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentLang = btn.getAttribute('data-lang');
      doSearch(currentQuery);
    });
  });

  function doSearch(q) {
    var resultsEl = document.getElementById('search-results');
    var countEl   = document.getElementById('search-count');

    if (!q || q.length < 2) {
      resultsEl.innerHTML = '';
      countEl.textContent = '';
      return;
    }

    var terms = q.toLowerCase().split(/\s+/).filter(Boolean);

    var filtered = index.filter(function(item){
      if (currentLang !== 'all' && item.lang !== currentLang) return false;
      if (currentTag && (!item.tags || item.tags.indexOf(currentTag) === -1)) return false;
      if (currentAuthor && item.author !== currentAuthor) return false;
      var haystack = [item.title, item.desc, item.author, item.body].join(' ').toLowerCase();
      return terms.every(function(t){ return haystack.indexOf(t) !== -1; });
    });

    // Score: title match > desc match > body match
    filtered.sort(function(a, b){
      return score(b, terms) - score(a, terms);
    });

    countEl.textContent = filtered.length + ' резултата / results';

    if (filtered.length === 0) {
      resultsEl.innerHTML = '<div class="no-results">Няма резултати / No results found.</div>';
      return;
    }

    resultsEl.innerHTML = filtered.map(function(item){
      var displayImg = item.img.replace(/ /g, '%20');
      var highlighted_title = highlight(item.title, terms);
      var highlighted_desc  = highlight(item.desc, terms);
      var meta = [];
      if (item.author) meta.push(escHtml(item.author));
      if (item.date)   meta.push(escHtml(item.date));
      return '<a href="' + item.url + '" class="result-card">' +
        '<img src="' + displayImg + '" alt="' + escHtml(item.title) + '" loading="lazy" width="60" height="60">' +
        '<div class="result-info">' +
          '<h3>' + highlighted_title + '</h3>' +
          (meta.length ? '<p class="result-meta">' + meta.join(' · ') + '</p>' : '') +
          '<p class="result-desc">' + highlighted_desc + '</p>' +
        '</div>' +
      '</a>';
    }).join('');
  }

  function score(item, terms) {
    var s = 0;
    var t = item.title.toLowerCase();
    var d = item.desc.toLowerCase();
    terms.forEach(function(term){
      if (t.indexOf(term) !== -1) s += 10;
      if (d.indexOf(term) !== -1) s += 5;
    });
    return s;
  }

  function highlight(text, terms) {
    if (!text) return '';
    var escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    terms.forEach(function(term){
      var re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
      escaped = escaped.replace(re, '<mark class="result-highlight">$1</mark>');
    });
    return escaped;
  }
})();
</script>
