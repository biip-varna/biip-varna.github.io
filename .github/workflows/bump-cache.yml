name: Bump asset cache version

on:
  push:
    paths:
      - 'style.css'
      - 'biip.js'
      - '*.html'
      - 'articles/*.html'
      - 'experts/*.html'

jobs:
  bump:
    runs-on: ubuntu-latest
    # Don't re-trigger on the auto-bump commit itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide bump vs normalize
        id: mode
        run: |
          # List files changed in this push
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -qE '^(style\.css|biip\.js)$'; then
            echo "mode=bump" >> "$GITHUB_OUTPUT"
            echo "CSS or JS changed — will increment version."
          else
            echo "mode=normalize" >> "$GITHUB_OUTPUT"
            echo "Only HTML files changed — will normalize to current version."
          fi

      - name: Run bump-cache.sh
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "bump" ]; then
            bash bump-cache.sh
          else
            bash bump-cache.sh --normalize
          fi

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -u
            git commit -m "chore: bump asset cache version [skip ci]"
            git push
          else
            echo "No version change needed."
          fi
