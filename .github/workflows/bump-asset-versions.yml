name: Bump asset version strings

# Runs whenever style.css or biip.js is pushed to main.
# Updates the ?v=... query strings in all HTML files and in sw.js
# so browser HTTP caches are invalidated automatically.

on:
  push:
    branches: [main]
    paths:
      - 'style.css'
      - 'biip.js'

jobs:
  bump-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Use a token that can push back to main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version string from commit SHA
        id: ver
        run: echo "ver=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update style.css version in all HTML files
        run: |
          find . -name "*.html" \
            -exec sed -i 's/style\.css?v=[^"'"'"' ]*/style.css?v=${{ steps.ver.outputs.ver }}/g' {} +

      - name: Update biip.js version in all HTML files
        run: |
          find . -name "*.html" \
            -exec sed -i 's/biip\.js?v=[^"'"'"' ]*/biip.js?v=${{ steps.ver.outputs.ver }}/g' {} +

      - name: Update sw.js PRECACHE_ASSETS and CACHE_VERSION
        run: |
          VER="${{ steps.ver.outputs.ver }}"
          sed -i "s|'/style\.css?v=[^']*'|'/style.css?v=${VER}'|g" sw.js
          sed -i "s|'/biip\.js?v=[^']*'|'/biip.js?v=${VER}'|g" sw.js
          sed -i "s/var CACHE_VERSION = 'biip-[^']*'/var CACHE_VERSION = 'biip-${VER}'/" sw.js

      - name: Commit and push version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: bump asset versions to ${{ steps.ver.outputs.ver }}"
          git push
